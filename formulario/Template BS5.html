<!DOCTYPE html>
<html lang="pt-br"><head>
        <title>Template</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>        
    </head>
    <body>
        <div id="titulo">
            <h1>
                Agendamento
            </h1>
        </div>
        <div id="Dados_paciente">
            <h2>
                Dados do paciente
            </h2>
        </div>
        <form>
            <form>
  <div class="row">
    <div class="col">
        <h5>Nome</h5>
      <input type="text" class="form-control" placeholder="Nome">
    </div>
    <div class="col">
        <h5>Sobrenome</h5>
      <input type="text" class="form-control" placeholder="Sobrenome">
    </div>
  </div>
  <div class="row">
    <div class="col">
        <h5>CPF</h5>
      <input type="text" class="form-control" placeholder="Digite seu CPF">
    </div>
    <div class="col">
        <h5>Data de nascimento</h5>
      <input type="text" class="form-control" placeholder="xx/xx/xxxx">
    </div>
  </div>
  <div class="row">
    <div class="col">
        <h5>Telefone</h5>
      <input type="text" class="form-control" placeholder="Telefone">
    </div>
    <div class="col">
        <h5>CEP
        </h5>
      <input type="text" class="form-control" placeholder="CEP">
    </div>
  </div>
     <div class="row">
    <div class="col">
        <h5>Endereço</h5>
      <input type="text" class="form-control" placeholder="Endereço">
    </div>

    <div id="dados_consulta">
        <h2>
            Dados da consulta
        </h2>
    </div>

      <div class="row">
    <div class="col">
        <h5>Clinica</h5>
     <input class="form-control" type="text" placeholder="Default input">
    </div>
    <div class="col">
        <h5>Especialidade</h5>
      <input class="form-control" type="text" placeholder="Default input">
    </div>
  </div>
      <div class="row">
    <div class="col">
        <h5>Data</h5>
      <input type="text" class="form-control" placeholder="xx/xx/xxxx">
    </div>
    <div class="col">
        <h5>Hora</h5>
      <input type="text" class="form-control" placeholder="xx:xx">
    </div>
  </div>
     </div>
 
     <div class="form-group">
    <label for="exampleFormControlTextarea1">Example textarea</label>
    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
  </div>
</form>
    </body>
    </html>
